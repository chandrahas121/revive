# Nginx as an API GATEWAY (not just a load balancer).
#
# It now does two jobs:
#   1. Routes /api/tryon/ to the independent tryon-service (FastAPI).
#   2. Round-robins everything else across the Django backends.
#
# This is the moment the architecture becomes real microservices: one entry
# point, traffic split per service, each scaling on its own. Add more upstreams
# (fittwin, pricing) the same way.

upstream django_backends {
    # round-robin by default — add more backend entries to scale horizontally
    server backend1:8000;
    server backend2:8000;
}

upstream tryon_service {
    server tryon:8001;
}

server {
    listen 80;

    # ── Virtual Try-On → its own service ─────────────────────────────────────
    # proxy_pass has no URI part, so the full path (/api/tryon/ and
    # /api/tryon/status/<id>/) is forwarded unchanged to the FastAPI service.
    location /api/tryon/ {
        proxy_pass http://tryon_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Everything else → Django backends ────────────────────────────────────
    location / {
        proxy_pass http://django_backends;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
    }
}
