# Nginx load balancer — distributes traffic between two Django backend instances.
# This is what "horizontal scaling" looks like: nginx sits in front and round-robins
# requests across backend1 and backend2. Add more backend entries to scale further.

upstream django_backends {
    # round-robin by default — each request goes to the next server in the list
    server backend1:8000;
    server backend2:8000;
}

server {
    listen 80;

    # Forward API requests to one of the Django instances
    location / {
        proxy_pass http://django_backends;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
    }

    # Uploaded media files (served directly by nginx — faster than going through Django)
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
