version: '3.9'

# This docker-compose mimics a production deployment:
#   - PostgreSQL instead of SQLite (real production database)
#   - Redis for caching (demand index + listing cache)
#   - 2 Django backend instances running simultaneously (horizontal scaling)
#   - Nginx as a load balancer in front of both backends
#
# Run: docker-compose up --build
# Then open: http://localhost  (nginx → backend1 or backend2, round-robin)
# API:        http://localhost/api/listings/

services:

  # ─── Database ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: revive
      POSTGRES_USER: revive
      POSTGRES_PASSWORD: revivepass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U revive"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Cache ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Backend instance 1 ─────────────────────────────────────────────────────
  backend1:
    build: .
    environment:
      DATABASE_URL: postgres://revive:revivepass@db:5432/revive
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: demo-secret-key-change-in-real-production
      DEBUG: "False"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend1,backend2"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost"
      CSRF_TRUSTED_ORIGINS: "http://localhost:5173,http://localhost"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_files:/app/backend/media

  # ─── Backend instance 2 (identical — this is horizontal scaling) ─────────────
  backend2:
    build: .
    environment:
      DATABASE_URL: postgres://revive:revivepass@db:5432/revive
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: demo-secret-key-change-in-real-production
      DEBUG: "False"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend1,backend2"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost"
      CSRF_TRUSTED_ORIGINS: "http://localhost:5173,http://localhost"
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_files:/app/backend/media

  # ─── Load balancer (distributes traffic between backend1 and backend2) ────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_files:/app/media:ro
    depends_on:
      - backend1
      - backend2

volumes:
  pgdata:
  media_files:
